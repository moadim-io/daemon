name: Changelog

# Require a changeset on any PR that touches `src/`, `ui/`, or `client/`, so
# user-facing or behavioral changes are documented as they land ("Today's
# TODO, tomorrow's changelog"). Docs-, CI-, and test-only PRs are exempt — the
# gate only fires when product code under src/ or client/ changes. Add
# the `skip-changelog` label to a PR to bypass the check for deliberately
# undocumented changes.
# Dependabot PRs are exempt — dependency bumps don't need a hand-written
# changeset.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Restrict the default GITHUB_TOKEN to read-only; this workflow only needs to
# check out the repo and read CHANGELOG.md / the diff, never writes anything.
permissions:
  contents: read

# Cancel a stale run when a PR gets a new push, matching lint.yml's behavior
# so superseded changelog checks don't pile up and burn CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: unreleased-entry
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect src/ or client/ changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - 'src/**'
              - 'client/**'

      - name: Install pnpm
        if: steps.filter.outputs.code == 'true' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        if: steps.filter.outputs.code == 'true' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.code == 'true' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: pnpm install --frozen-lockfile

      - name: Require a changeset when src/ or client/ changed
        if: steps.filter.outputs.code == 'true' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: |
          pnpm exec changeset status --since=origin/main || {
            echo "::error::PR changes src/ or client/ but no changeset was added. Run 'pnpm changeset', or apply the 'skip-changelog' label."
            exit 1
          }
