[package]
name = "server"
version = "0.1.0"
edition = "2021"

[dependencies]
# Shared
console_log = "1"
futures = "0.3"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console"] }

# Native-only
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
actix-web = "4"
tokio = { version = "1", features = ["full"] }

[[bin]]
name = "server"
path = "src/main.rs"
