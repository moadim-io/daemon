      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      transition: all 0.1s;
      letter-spacing: 0.04em;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* cron preview */
    .cron-preview {
      margin-top: 6px;
      padding: 6px 10px;
      font-size: 11px;
      border-left: 2px solid var(--border-hi);
      color: var(--text-dim);
      background: var(--bg-3);
      min-height: 26px;
      transition: border-color 0.12s, color 0.12s;
    }
    .cron-preview.ok    { border-left-color: var(--accent); color: var(--accent); }
    .cron-preview.bad   { border-left-color: var(--red); color: var(--red); }

    /* json error */
    .field-err { font-size: 10px; color: var(--red); margin-top: 3px; }

    /* enabled toggle row */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 11px;
      background: var(--bg-3);
      border: 1px solid var(--border);
    }
    .toggle-row-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Confirm dialog ── */
    .confirm-dialog {
      background: var(--bg-2);
      border: 1px solid var(--red);
      padding: 22px;
      width: 350px;
      max-width: 92vw;
      transform: translateY(8px);
      transition: transform 0.15s;
    }
    .overlay.open .confirm-dialog { transform: translateY(0); }

    .confirm-title { font-size: 12px; color: var(--red); letter-spacing: 0.06em; margin-bottom: 8px; }
    .confirm-msg   { font-size: 11px; color: var(--text-mid); line-height: 1.5; margin-bottom: 18px; }
    .confirm-acts  { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed; bottom: 22px; right: 22px;
      z-index: 500;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }

    .toast {
      font-family: var(--mono);
      font-size: 11px;
      padding: 9px 14px;
      border: 1px solid;
      max-width: 300px;
      animation: toast-in 0.18s ease-out;
      letter-spacing: 0.03em;
    }
    .toast.ok  { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .toast.err { border-color: var(--red);    color: var(--red);    background: var(--red-dim); }
    @keyframes toast-in { from { opacity:0; transform: translateX(12px); } to { opacity:1; transform:none; } }

    /* ── Loader ── */
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 1px solid var(--text-ghost);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
    }

    /* ── System section ── */
    .system-section { margin-top: 48px; }

    .badge-readonly {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.16em;
      padding: 2px 6px;
      border: 1px solid #3a4a7a;
      color: #7c8fc9;
      background: #0c1020;
      vertical-align: middle;
      margin-left: 8px;
      text-transform: uppercase;
    }

    .sys-source {
      font-size: 9px;
      color: #7c8fc9;
      letter-spacing: 0.06em;
    }

    tbody tr.sys-row { opacity: 0.85; }
    tbody tr.sys-row:hover { background: #0c1420; }

    /* ── Create page ── */
    .create-page { max-width: 640px; margin: 0 auto; padding: 32px 28px; }

    .page-hd {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-hi);
    }

    .page-card {
      background: var(--bg-2);
      border: 1px solid var(--border-hi);
    }

    /* ── Logs page ── */
    .logs-page { max-width: 1100px; margin: 0 auto; padding: 32px 28px; }

    .logs-wrap {
      border: 1px solid var(--border);
      background: var(--bg-2);
      min-height: 300px;
      max-height: 70vh;
      overflow-y: auto;
      position: relative;
    }

    .logs-content {
      display: block;
      padding: 16px 18px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-mid);
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    .logs-empty {
      padding: 48px;
      text-align: center;
      font-size: 11px;
      color: var(--text-ghost);
      letter-spacing: 0.12em;
    }

    .logs-error {
      padding: 24px 18px;
      font-size: 11px;
      color: var(--red);
      border-left: 2px solid var(--red);
      margin: 16px;
      background: var(--red-dim);
    }

    .act-btn.logs { color: var(--text-ghost); }
    .act-btn.logs:hover { color: var(--text-mid); border-color: var(--border-hi); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
<body></body>
</html>
