[package]
name = "ui"
version = "0.1.0"
edition = "2021"
# Kept in lockstep with the workspace root's MSRV (see Cargo.toml).
rust-version = "1.88"

[[bin]]
name = "ui"
path = "src/main.rs"

[dependencies]
yew = { version = "0.23", features = ["csr"] }
yew-router = "0.20"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
croner = "3"
chrono = "0.4"
gloo-net = { version = "0.7", features = ["http"] }
gloo-timers = { version = "0.4", features = ["futures"] }
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Clipboard", "Document", "DomTokenList", "Element", "EventTarget", "HtmlElement", "HtmlInputElement", "HtmlSelectElement", "KeyboardEvent", "Location", "Navigator", "Storage", "Window"] }
log = "0.4"
console_log = "1"

[lints.clippy]
all = "deny"
# Reject a `&self` method that never reads `self` â€” it should be an associated function instead, so
# the signature doesn't overstate what the method needs from its receiver. Denied root-side since
# #1067, but the `ui` crate has its own `[lints.clippy]` table and doesn't inherit root's extended
# deny-list, so this never applied to `ui/src` despite CI's `clippy` job running `--workspace`. The
# `ui` crate is already clean, so `deny` locks that in.
unused_self = "deny"
# Reject `use some::module::*;` glob imports. Explicit imports make it clear
# at the call site which module a name comes from, avoid silent breakage or
# ambiguity when the globbed module adds a new item, and keep `rust-analyzer`
# "go to definition" unambiguous.
wildcard_imports = "deny"
# Mirrors the root crate's `unwrap_used = "deny"` (see Cargo.toml): a panic in the UI
# crate tears down the running Yew app for the user with no graceful recovery, the
# same class of failure the root crate's lint doc guards against for the server.
# `all` above doesn't cover this â€” `unwrap_used` is a `restriction`-group lint, not
# part of `clippy::all` â€” so it needs its own explicit entry.
unwrap_used = "deny"
# Prefer naming the method directly (`ToString::to_string`, `String::as_str`) over
# wrapping it in a closure that only forwards the receiver. Kept in lockstep with
# the same lint already enabled workspace-root-side in Cargo.toml â€” the `ui`
# crate has its own `[lints]` table (no `workspace = true` inheritance) so it was
# silently exempt despite `clippy --workspace` covering it in CI.
redundant_closure_for_method_calls = "deny"
# Reject `async fn`s that never `.await` anything â€” they don't need to be async,
# and being async needlessly propagates async-ness to callers. Denied root-side
# (see Cargo.toml), but the `ui` crate has its own `[lints.clippy]` table and
# doesn't inherit root's extended deny-list, so this never applied to `ui/src`
# despite CI's `clippy` job running `--workspace`. The `ui` crate is already
# clean, so `deny` locks that in.
unused_async = "deny"
